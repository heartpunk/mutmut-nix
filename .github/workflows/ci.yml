name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-14
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Build mutmut
        run: nix build .#packages.${{ matrix.system }}.mutmut -L

      - name: Smoke test
        run: |
          nix run .#packages.${{ matrix.system }}.default -- -c "
          import mutmut
          print('mutmut version:', mutmut.__version__)
          "
